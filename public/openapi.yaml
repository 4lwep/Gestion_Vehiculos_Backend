openapi: 3.1.1
info:
  title: "Gestion Vehiculos API"
  description: |
    # API de Gestión de Vehículos y Trayectos
    Esta API proporciona funcionalidades para la gestión de flota, conductores, trayectos y mantenimiento.

    ## **Autenticación**
    - Registro, Login y Verificación de estado (JWT).

    ## **Gestión de Flota**
    - **Conductores**: CRUD completo de personal.
    - **Vehículos**: Gestión de unidades, incluyendo imágenes y estado.
    - **Revisiones y Averías**: Seguimiento del mantenimiento y reparaciones.
    - **Trayectos y Viajes**: Registro de rutas, distancias y asignaciones.

    ## **Archivos**
    - Subida y gestión de imágenes de vehículos en Cloudinary.
  version: "1.2.0"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        fullName: { type: string }
        isActive: { type: boolean }
        roles: { type: array, items: { type: string } }

    Conductor:
      type: object
      required: [dni, nombre, apellidos, telefono, direccion, fechaNacimiento]
      properties:
        dni: { type: string }
        nombre: { type: string }
        apellidos: { type: string }
        telefono: { type: string }
        direccion: { type: string }
        fechaNacimiento: { type: string, format: date-time }

    Vehiculo:
      type: object
      required: [matricula, marca, modelo, tipo, kilometrosTotales, nuevo, gastoPorKm]
      properties:
        matricula: { type: string }
        marca: { type: string }
        modelo: { type: string }
        fechaCompra: { type: string, format: date-time }
        anyosAntiguedad: { type: string }
        tipo: { type: string }
        kilometrosTotales: { type: number }
        alimentacion: { type: string }
        precio: { type: number }
        nuevo: { type: boolean }
        gastoPorKm: { type: number }
        conductorDni: { type: string, nullable: true }
        averiaId: { type: integer, nullable: true }

    Trayecto:
      type: object
      required: [id, horaSalida, horaLlegada, origen, destino, distanciaEnKm]
      properties:
        id: { type: integer }
        horaSalida: { type: string, format: date-time }
        horaLlegada: { type: string, format: date-time }
        origen: { type: string }
        destino: { type: string }
        distanciaEnKm: { type: number }
        viajeId: { type: integer, nullable: true }

    Viaje:
      type: object
      required: [id]
      properties:
        id: { type: integer }

    Revision:
      type: object
      required: [id, fecha, lugar, activo, aprobada]
      properties:
        id: { type: integer }
        fecha: { type: string, format: date-time }
        lugar: { type: string }
        activo: { type: boolean }
        aprobada: { type: boolean }

    Averia:
      type: object
      required: [id, descripcion, fechaAveria, fechaComienzoReparacion, fechaFinReparacion, lugarReparacion, costeReparacion]
      properties:
        id: { type: integer }
        descripcion: { type: string }
        fechaAveria: { type: string, format: date-time }
        fechaComienzoReparacion: { type: string, format: date-time }
        fechaFinReparacion: { type: string, format: date-time }
        lugarReparacion: { type: string }
        costeReparacion: { type: number }

    InfoTrayecto:
      type: object
      required: [id, activo, completado, gasto]
      properties:
        id: { type: integer }
        activo: { type: boolean }
        completado: { type: boolean }
        gasto: { type: number }
        conductorDni: { type: string, nullable: true }
        trayectoId: { type: integer, nullable: true }

paths:
  # AUTH
  /api/auth/register:
    post:
      summary: Registro de usuario
      tags: [Auth]
      responses: { "201": { description: OK } }
  /api/auth/login:
    post:
      summary: Login de usuario
      tags: [Auth]
      responses: { "201": { description: OK } }

  # CONDUCTORES
  /api/conductores:
    get:
      summary: Listar conductores
      tags: [Conductores]
      responses: { "200": { description: OK } }
    post:
      summary: Crear conductor
      tags: [Conductores]
      security: [{ bearerAuth: [] }]
      responses: { "201": { description: OK } }
  /api/conductores/{dni}:
    get:
      summary: Obtener conductor
      tags: [Conductores]
      parameters: [{ name: dni, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK } }
    patch:
      summary: Actualizar conductor
      tags: [Conductores]
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: OK } }
    delete:
      summary: Eliminar conductor
      tags: [Conductores]
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: OK } }

  # VEHICULOS
  /api/vehiculos:
    get:
      summary: Listar vehículos
      tags: [Vehículos]
      responses: { "200": { description: OK } }
    post:
      summary: Crear vehículo
      tags: [Vehículos]
      security: [{ bearerAuth: [] }]
      responses: { "201": { description: OK } }
  /api/vehiculos/{matricula}:
    get:
      summary: Obtener vehículo
      tags: [Vehículos]
      parameters: [{ name: matricula, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK } }
    patch:
      summary: Actualizar vehículo
      tags: [Vehículos]
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: OK } }
    delete:
      summary: Eliminar vehículo
      tags: [Vehículos]
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: OK } }

  # TRAYECTOS
  /api/trayectos:
    get:
      summary: Listar trayectos
      tags: [Trayectos]
      responses: { "200": { description: OK } }
    post:
      summary: Crear trayecto
      tags: [Trayectos]
      security: [{ bearerAuth: [] }]
      responses: { "201": { description: OK } }
  /api/trayectos/{id}:
    get:
      summary: Obtener trayecto
      tags: [Trayectos]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses: { "200": { description: OK } }
    patch:
      summary: Actualizar trayecto
      tags: [Trayectos]
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: OK } }
    delete:
      summary: Eliminar trayecto
      tags: [Trayectos]
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: OK } }

  # FILES
  /api/files/vehiculo:
    post:
      summary: Subir imagen de vehículo
      tags: [Imágenes]
      security: [{ bearerAuth: [] }]
      responses: { "201": { description: OK } }
